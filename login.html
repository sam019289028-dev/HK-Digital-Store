<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入 | HK Digital Store</title>
  <link rel="stylesheet" href="styles.css?v=20260608-brand-icons-v7">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">HD</span><span>HK Digital Store</span></a>
    <button class="nav-toggle" type="button" aria-label="開關選單">☰</button>
    <nav class="site-nav" aria-label="主要導覽">
      <a class="cart-link" href="cart.html">購物車 <span data-cart-count>0</span></a>
    </nav>
  </header>

  <main>
    <section class="page-hero compact auth-page">
      <p class="eyebrow">Member Access</p>
      <h1>登入帳戶</h1>
      <p>登入後可以保存購物車和訂單記錄，之後也方便查看付款和發貨狀態。</p>
    </section>

    <section class="section auth-page-layout auth-split-layout">
      <form id="login-form" class="panel auth-page-form" data-login-page-form>
        <h2>登入</h2>
        <label>
          Email
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          密碼
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <p id="login-error" class="auth-error" data-login-page-error role="alert"></p>
        <button class="button primary wide" type="submit">登入</button>
        <p class="auth-switch">還沒有帳戶？<a href="register.html">建立帳戶</a></p>
      </form>
      <aside class="auth-benefit-panel" aria-label="登入後可使用功能">
        <p class="eyebrow">Why Sign In</p>
        <h2>更快查看訂單與付款狀態</h2>
        <div>
          <strong>保存購物車</strong>
          <span>跨頁面保留已選商品與方案。</span>
        </div>
        <div>
          <strong>訂單紀錄</strong>
          <span>登入後可查看提交過的訂單狀態。</span>
        </div>
        <div>
          <strong>客服跟進</strong>
          <span>付款和交付資訊集中管理。</span>
        </div>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 HK Digital Store. 下單前請先確認商品地區、方案及交付安排。</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="script.js?v=20260608-brand-icons-v7"></script>
</body>
</html>
