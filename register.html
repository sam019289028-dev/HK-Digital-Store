<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>註冊 | HK Digital Store</title>
  <link rel="stylesheet" href="styles.css?v=20260608-brand-icons-v8">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">HD</span><span>HK Digital Store</span></a>
    <button class="nav-toggle" type="button" aria-label="開關選單">☰</button>
    <nav class="site-nav" aria-label="主要導覽">
      <a class="cart-link" href="cart.html">購物車 <span data-cart-count>0</span></a>
    </nav>
  </header>

  <main>
    <section class="page-hero compact auth-page">
      <p class="eyebrow">Create Account</p>
      <h1>建立帳戶</h1>
      <p>建立帳戶後可以保存購物車和訂單記錄，方便後續客服跟進。</p>
    </section>

    <section class="section auth-page-layout auth-split-layout">
      <form id="register-form" class="panel auth-page-form" data-register-page-form>
        <h2>註冊</h2>
        <label>
          稱呼 / 用戶名
          <input type="text" name="name" autocomplete="name" required>
        </label>
        <label>
          Email
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          密碼
          <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <label>
          確認密碼
          <input type="password" name="confirmPassword" autocomplete="new-password" required>
        </label>
        <p id="register-error" class="auth-error" data-register-page-error role="alert"></p>
        <button class="button primary wide" type="submit">建立帳戶</button>
        <p class="auth-switch">已有帳戶？<a href="login.html">登入</a></p>
      </form>
      <aside class="auth-benefit-panel" aria-label="建立帳戶好處">
        <p class="eyebrow">Member Benefits</p>
        <h2>建立帳戶後更容易跟進訂單</h2>
        <div>
          <strong>查詢付款狀態</strong>
          <span>付款後可回到帳戶頁查看訂單紀錄。</span>
        </div>
        <div>
          <strong>減少重複填寫</strong>
          <span>之後購買可更快完成資料確認。</span>
        </div>
        <div>
          <strong>私隱提醒</strong>
          <span>請勿提交密碼、驗證碼或敏感帳戶資料。</span>
        </div>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 HK Digital Store. 下單前請先確認商品地區、方案及交付安排。</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="script.js?v=20260608-brand-icons-v8"></script>
</body>
</html>
